<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>IG Post 1 — Welcome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@900&family=Open+Sans:wght@400;600;700;800&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    background: radial-gradient(ellipse at top right, #1a3a5c 0%, #0f2d4a 60%, #08203a 100%);
    font-family: 'Open Sans', sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  /* faint big shield watermark */
  .bg-shield {
    position: absolute; right: -200px; bottom: -240px;
    width: 1000px; height: 1000px;
    opacity: 0.06;
    transform: rotate(-12deg);
  }
  .container {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 90px 80px;
    z-index: 2;
  }
  /* brand strip */
  .brandstrip {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 36px;
  }
  .brandstrip .mark { width: 64px; height: 72px; }
  .brandstrip .name {
    font-family: 'Open Sans', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .brandstrip .name span { color: #c9922a; }
  .kicker {
    font-size: 13px; font-weight: 800; letter-spacing: 4px;
    color: #c9922a; text-transform: uppercase;
    margin-bottom: 28px;
  }
  h1 {
    font-family: 'Merriweather', serif;
    font-weight: 900;
    font-size: 96px; line-height: 1.04;
    margin: 0;
    color: #fff;
    letter-spacing: -1px;
  }
  h1 em {
    color: #c9922a;
    font-style: normal;
  }
  .swap-line {
    margin-top: 56px;
    height: 5px; width: 110px;
    background: #c41e3a;
    border-radius: 3px;
  }
  .sub {
    margin-top: 44px;
    font-size: 28px; line-height: 1.45;
    color: rgba(255,255,255,0.82);
    max-width: 880px;
    font-weight: 400;
  }
  .sub b { color: #fff; font-weight: 700; }
  .footer {
    position: absolute; left: 80px; right: 80px; bottom: 60px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 18px; font-weight: 600; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }
  .footer .right { color: #c9922a; }
</style></head>
<body>

<!-- giant faded shield in background -->
<svg class="bg-shield" viewBox="0 0 120 135" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(-4.4, -3.8) scale(2.3)">
    <path d="M28 2 L54 11 L54 32 C54 46 42 56 28 60 C14 56 2 46 2 32 L2 11 Z" fill="#c9922a"/>
  </g>
</svg>

<div class="container">

  <div class="brandstrip">
    <svg class="mark" viewBox="0 0 120 135" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(-4.4, -3.8) scale(2.3)">
        <path d="M28 2 L54 11 L54 32 C54 46 42 56 28 60 C14 56 2 46 2 32 L2 11 Z"
              fill="#1a3a5c" stroke="#c9922a" stroke-width="2.2"/>
        <path d="M28 9 L47 17 L47 32 C47 43 39 51 28 54 C17 51 9 43 9 32 L9 17 Z"
              fill="#eef1f5"/>
        <line x1="28" y1="43" x2="28" y2="20" stroke="#c9922a" stroke-width="2.8" stroke-linecap="round"/>
        <polyline points="21,28 28,20 35,28" fill="none" stroke="#c9922a" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>
        <line x1="23" y1="40" x2="28" y2="43" stroke="#c9922a" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="33" y1="40" x2="28" y2="43" stroke="#c9922a" stroke-width="1.8" stroke-linecap="round"/>
      </g>
    </svg>
    <div class="name">Robinhood <span>Adjusting</span></div>
  </div>

  <div class="kicker">Public Adjusters · South Florida</div>

  <h1>Your insurance company has an adjuster.<br><em>Now you have one too.</em></h1>

  <div class="swap-line"></div>

  <div class="sub">
    We represent <b>you</b> — not the insurance company. No upfront cost. Free claim review.
  </div>

  <div class="footer">
    <div>robinhoodadjusting.com</div>
    <div class="right">(561) 316-6455</div>
  </div>

</div>
</body></html>
